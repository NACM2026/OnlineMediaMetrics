<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NACM Southwest | Online Media Metrics Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a3a6b;
    --navy-dark: #0f2347;
    --navy-light: #2a5298;
    --green: #4a9c2f;
    --green-light: #5cb83a;
    --white: #ffffff;
    --off-white: #f4f6f9;
    --gray: #6b7280;
    --gray-light: #e5e7eb;
    --error: #dc2626;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--navy-dark);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 20% 80%, rgba(74,156,47,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 20%, rgba(42,82,152,0.15) 0%, transparent 60%);
  }

  body::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: 
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .login-container {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 440px;
    padding: 20px;
  }

  .login-card {
    background: var(--white);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
  }

  .login-header {
    background: var(--white);
    padding: 36px 40px 28px;
    text-align: center;
    border-bottom: 3px solid var(--navy);
  }

  .login-header img {
    max-width: 220px;
    height: auto;
  }

  .login-subtitle {
    margin-top: 14px;
    font-family: 'Libre Baskerville', serif;
    font-size: 13px;
    color: var(--navy);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .login-body {
    padding: 36px 40px 40px;
    background: var(--off-white);
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--navy);
    margin-bottom: 20px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--gray-light);
  }

  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--navy);
    margin-bottom: 7px;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--gray-light);
    border-radius: 3px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 15px;
    color: var(--navy-dark);
    background: var(--white);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input:focus {
    border-color: var(--navy);
    box-shadow: 0 0 0 3px rgba(26,58,107,0.1);
  }

  .btn-login {
    width: 100%;
    padding: 13px;
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: 3px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 8px;
  }

  .btn-login:hover { background: var(--navy-light); }
  .btn-login:active { transform: scale(0.99); }

  .error-msg {
    background: #fef2f2;
    border: 1px solid #fca5a5;
    border-radius: 3px;
    color: var(--error);
    font-size: 13px;
    padding: 10px 14px;
    margin-bottom: 18px;
    display: none;
  }

  .error-msg.show { display: block; }

  .login-footer {
    padding: 16px 40px;
    background: var(--navy-dark);
    text-align: center;
  }

  .login-footer span {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.04em;
  }

  .accent-bar {
    height: 4px;
    background: linear-gradient(90deg, var(--green) 0%, var(--navy-light) 100%);
  }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="accent-bar"></div>
    <div class="login-header">
      <img src="NACM_SW_Logo.png" alt="NACM Southwest">
      <div class="login-subtitle">Online Media &nbsp;|&nbsp; Quarterly Metrics Portal</div>
    </div>
    <div class="login-body">
      <div class="section-label">Member Sign In</div>
      <div class="error-msg" id="errorMsg">Invalid username or password. Please try again.</div>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
      </div>
      <button class="btn-login" onclick="doLogin()">Sign In &rarr;</button>
    </div>
    <div class="login-footer">
      <span>Data is collected and reported anonymously &nbsp;&bull;&nbsp; NACM Southwest &copy; 2025</span>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://nffvgazjtpbgchldtacs.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5mZnZnYXpqdHBiZ2NobGR0YWNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTU5NTMsImV4cCI6MjA5Mjg5MTk1M30.QODySdFiQwnvoUM17FE5ajJWGjlIKbCXA0L7_inUit0';

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.classList.remove('show');

    if (!username || !password) {
      errorMsg.textContent = 'Please enter both username and password.';
      errorMsg.classList.add('show');
      return;
    }

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/om_users?username=eq.${encodeURIComponent(username)}&select=id,username,password_hash,is_admin`, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        }
      });
      const data = await res.json();

      if (!data || data.length === 0) {
        errorMsg.textContent = 'Invalid username or password.';
        errorMsg.classList.add('show');
        return;
      }

      const user = data[0];
      // Simple password check (plaintext for now; upgrade to bcrypt via Edge Function if needed)
      if (user.password_hash !== password) {
        errorMsg.textContent = 'Invalid username or password.';
        errorMsg.classList.add('show');
        return;
      }

      sessionStorage.setItem('om_user_id', user.id);
      sessionStorage.setItem('om_username', user.username);
      sessionStorage.setItem('om_is_admin', user.is_admin);

      if (user.is_admin) {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'survey.html';
      }
    } catch(err) {
      errorMsg.textContent = 'Connection error. Please try again.';
      errorMsg.classList.add('show');
    }
  }
</script>
</body>
</html>
